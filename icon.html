<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        header {
            background-color: #333;
            color: Dark red;
            padding: 15px 20px;
            text-align: center;
        }


        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }


        nav a:hover {
            text-decoration: underline;
        }


        icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<header>
    <div class="icons">
        <i class="fa-solid fa-b fa-beat" style="color: rgb(65, 23, 23);"></i>
        <i class="fa-regular fa-a fa-bounce" style="color: rgb(177, 151, 252);"></i>
    <i class="fa-duotone fa-regular fa-d fa-spin" style="--fa-primary-color: rgb(30, 48, 80); --fa-secondary-color: rgb(255, 0, 135); --fa-secondary-opacity: 1;"></i>
    <i class="fa-solid fa-egg fa-xl" style="color: rgb(99, 230, 190);"></i>
    <i class="fa-solid fa-text-slash fa-fade fa-xl" style="color: rgb(65, 23, 23);"></i>
    <i class="fa-solid fa-circle-h fa-bounce fa-lg" style="color: rgb(228, 101, 101);"></i>
    
    </div>
</header>


</body>
<script src="https://kit.fontawesome.com/cddcb71e78.js" crossorigin="anonymous"></script>
</html>
